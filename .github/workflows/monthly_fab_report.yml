name: Monthly Fab News Report

on:
  schedule:
    - cron: '0 21 1 * *'  # 매월 1일 21:00 UTC = 다음날 06:00 KST
  workflow_dispatch:       # 수동 실행 버튼 활성화

concurrency:
  group: monthly-fab-report
  cancel-in-progress: false

jobs:
  build:
    runs-on: self-hosted
    env:
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai feedparser python-dateutil googlenewsdecoder requests openpyxl

      - name: Run monthly fab report
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python monthly_fab_report.py
